<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produce Function Profile Analysis</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1d2636;
      --muted: #5f6b7d;
      --line: #dde3ed;
      --accent: #0a7a6c;
      --accent-soft: #e5f5f2;
      --parent-col-width: 280px;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #fbfcfe 0%, var(--bg) 100%);
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .info {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 18px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 8px 14px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-right: 4px;
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }

    thead th {
      background: var(--accent);
      color: #ffffff;
      padding: 12px;
      text-align: left;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    thead th.sort-asc::after {
      content: " ▲";
      font-size: 11px;
    }

    thead th.sort-desc::after {
      content: " ▼";
      font-size: 11px;
    }

    tbody td {
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      vertical-align: top;
    }

    tbody tr:hover {
      background: var(--accent-soft);
    }

    .num {
      text-align: right;
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .function {
      word-break: break-word;
    }

    .parent-function {
      width: var(--parent-col-width);
      white-space: nowrap;
    }

    @media (max-width: 800px) {
      thead th:nth-child(2),
      thead th:nth-child(3),
      tbody td:nth-child(2),
      tbody td:nth-child(3) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Produce Function Profile Analysis</h1>
    <p class="subtitle" id="sourceFile"></p>

    <div class="info">
      <div class="info-grid">
        <div><span class="label">Parent Functions:</span><span id="parentFunctions"></span></div>
        <div><span class="label">Total CPU Time:</span><span id="totalCpu"></span></div>
        <div><span class="label">Parents Total Time:</span><span id="parentTotal"></span></div>
        <div><span class="label">Number of Children:</span><span id="childCount"></span></div>
      </div>
    </div>

    <div style="margin: 24px 0 12px; display: flex; align-items: center; gap: 8px;">
      <label for="parentFilter" class="label" style="margin-right: 0;">Parents</label>
      <select id="parentFilter" style="padding: 6px 10px; font-size: 13px; border: 1px solid var(--line); border-radius: 6px; background: white; cursor: pointer;">
        <option value="">All Parents</option>
      </select>
    </div>

    <h2 style="margin: 24px 0 12px; font-size: 18px;">Parent Functions Summary</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="num sort-desc" style="width: 150px;" data-sort-key="children_total_time" data-sort-type="number">Total Time</th>
            <th class="num" style="width: 140px;" data-sort-key="pct_of_total" data-sort-type="number">% of Total</th>
            <th data-sort-key="parent_function" data-sort-type="string">Parent Function</th>
          </tr>
        </thead>
        <tbody id="parentRows"></tbody>
      </table>
    </div>

    <h2 style="margin: 24px 0 12px; font-size: 18px;">Children Functions</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="num sort-desc" style="width: 150px;" data-sort-key="total_time" data-sort-type="number">Total Time</th>
            <th class="num" style="width: 140px;" data-sort-key="pct_of_parent" data-sort-type="number">% of Parent</th>
            <th class="num" style="width: 140px;" data-sort-key="pct_of_total" data-sort-type="number">% of Total</th>
            <th class="parent-function" data-sort-key="parent_function" data-sort-type="string">Parent Function</th>
            <th data-sort-key="function" data-sort-type="string">Function</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    const profileData = __PROFILE_DATA_JSON__;

    function formatNumber(value, digits) {
      if (value === null || value === undefined || Number.isNaN(value)) {
        return "N/A";
      }
      return Number(value).toFixed(digits);
    }

    function formatPercent(value) {
      if (value === null || value === undefined || Number.isNaN(value)) {
        return "N/A";
      }
      return Number(value).toFixed(2) + "%";
    }

    function sortValueForRow(row, key, type) {
      const value = row[key];
      if (type === "number") {
        if (value === null || value === undefined || Number.isNaN(Number(value))) {
          return Number.NEGATIVE_INFINITY;
        }
        return Number(value);
      }
      return String(value || "").toLowerCase();
    }

    function renderRows(dataRows) {
      const rows = document.getElementById("rows");
      rows.innerHTML = "";

      for (const child of dataRows) {
        const tr = document.createElement("tr");

        const tdTime = document.createElement("td");
        tdTime.className = "num";
        tdTime.textContent = child.total_time === null
          ? (child.total_time_raw || "N/A")
          : formatNumber(child.total_time, 6);

        const tdParent = document.createElement("td");
        tdParent.className = "num";
        tdParent.textContent = formatPercent(child.pct_of_parent);

        const tdTotal = document.createElement("td");
        tdTotal.className = "num";
        tdTotal.textContent = formatPercent(child.pct_of_total);

        const tdParentFn = document.createElement("td");
        tdParentFn.className = "parent-function";
        tdParentFn.textContent = child.parent_function || "N/A";

        const tdFn = document.createElement("td");
        tdFn.className = "function";
        tdFn.textContent = child.function || "N/A";

        tr.appendChild(tdTime);
        tr.appendChild(tdParent);
        tr.appendChild(tdTotal);
        tr.appendChild(tdParentFn);
        tr.appendChild(tdFn);
        rows.appendChild(tr);
      }
    }

    function renderParentRows(parentData) {
      const rows = document.getElementById("parentRows");
      rows.innerHTML = "";

      for (const parent of parentData) {
        const tr = document.createElement("tr");

        const tdTime = document.createElement("td");
        tdTime.className = "num";
        tdTime.textContent = parent.children_total_time === null || parent.children_total_time === undefined
          ? "N/A"
          : formatNumber(parent.children_total_time, 6);

        const tdPercent = document.createElement("td");
        tdPercent.className = "num";
        const pct = parent.pct_of_total;
        tdPercent.textContent = pct === null || pct === undefined || Number.isNaN(pct) ? "N/A" : formatPercent(pct);

        const tdParentFn = document.createElement("td");
        tdParentFn.className = "function";
        tdParentFn.textContent = parent.parent_function || "N/A";

        tr.appendChild(tdTime);
        tr.appendChild(tdPercent);
        tr.appendChild(tdParentFn);
        rows.appendChild(tr);
      }
    }

    function clearSortIndicators(headers) {
      for (const header of headers) {
        header.classList.remove("sort-asc", "sort-desc");
      }
    }

    function applyParentColumnWidth(children) {
      const names = ["Parent Function", ...(children || []).map((row) => row.parent_function || "N/A")];
      const probe = document.createElement("span");
      probe.style.position = "absolute";
      probe.style.visibility = "hidden";
      probe.style.whiteSpace = "nowrap";
      probe.style.font = "13px \"Segoe UI\", Helvetica, Arial, sans-serif";
      document.body.appendChild(probe);

      let maxWidth = 0;
      for (const name of names) {
        probe.textContent = String(name);
        maxWidth = Math.max(maxWidth, Math.ceil(probe.getBoundingClientRect().width));
      }

      document.body.removeChild(probe);
      const paddedWidth = maxWidth + 24;
      document.documentElement.style.setProperty("--parent-col-width", paddedWidth + "px");
    }

    document.getElementById("sourceFile").textContent = "Source: " + (profileData.source_file || "N/A");
    document.getElementById("parentFunctions").textContent = (profileData.parent_functions || []).join(", ");

    const summary = profileData.summary || {};
    document.getElementById("totalCpu").textContent = formatNumber(summary.total_cpu_time, 6);

    const parentTotalLabel =
      formatNumber(summary.parent_total_time, 6) +
      " (" + formatPercent(summary.parent_pct_of_total) + " of total)";
    document.getElementById("parentTotal").textContent = parentTotalLabel;

    document.getElementById("childCount").textContent = String(summary.children_count || 0);

    // Prepare parent function data with calculated percentages
    const parentFunctionData = (profileData.parent_function_totals || []).map((parent) => {
      const totalCpu = summary.total_cpu_time || 1;
      return {
        parent_function: parent.parent_function,
        children_total_time: parent.children_total_time,
        pct_of_total: (parent.children_total_time / totalCpu) * 100
      };
    });

    // Sort parent data by children_total_time descending
    parentFunctionData.sort((a, b) => {
      const aVal = a.children_total_time || 0;
      const bVal = b.children_total_time || 0;
      return bVal - aVal;
    });

    // Render parent functions table
    renderParentRows(parentFunctionData);

    const tableRows = [...(profileData.children || [])];
    
    // Populate parent function dropdown
    const parentFilter = document.getElementById("parentFilter");
    const uniqueParents = [...new Set((profileData.children || []).map(c => c.parent_function))].sort();
    for (const parent of uniqueParents) {
      const option = document.createElement("option");
      option.value = parent;
      option.textContent = parent;
      parentFilter.appendChild(option);
    }
    
    // Track filtered data
    let currentFilteredRows = [...tableRows];
    
    function updateChildCount() {
      document.getElementById("childCount").textContent = String(currentFilteredRows.length);
    }
    
    function applyFilter() {
      const selectedParent = parentFilter.value;
      if (selectedParent === "") {
        currentFilteredRows = [...tableRows];
      } else {
        currentFilteredRows = tableRows.filter(row => row.parent_function === selectedParent);
      }
      updateChildCount();
      // Re-render with current sort
      renderRows(currentFilteredRows);
    }
    
    parentFilter.addEventListener("change", applyFilter);
    
    // Get headers for each table separately
    const parentTableHeaders = document.querySelector("#parentRows").closest("table").querySelectorAll("thead th[data-sort-key]");
    const childTableHeaders = document.querySelector("#rows").closest("table").querySelectorAll("thead th[data-sort-key]");
    
    applyParentColumnWidth(tableRows);

    function sortByColumn(key, type, direction) {
      currentFilteredRows.sort((a, b) => {
        const left = sortValueForRow(a, key, type);
        const right = sortValueForRow(b, key, type);

        if (left < right) {
          return direction === "asc" ? -1 : 1;
        }
        if (left > right) {
          return direction === "asc" ? 1 : -1;
        }
        return 0;
      });
      renderRows(currentFilteredRows);
    }

    function sortParentByColumn(key, type, direction) {
      parentFunctionData.sort((a, b) => {
        const left = sortValueForRow(a, key, type);
        const right = sortValueForRow(b, key, type);

        if (left < right) {
          return direction === "asc" ? -1 : 1;
        }
        if (left > right) {
          return direction === "asc" ? 1 : -1;
        }
        return 0;
      });
      renderParentRows(parentFunctionData);
    }

    // Add sorting to parent table headers
    for (const header of parentTableHeaders) {
      header.addEventListener("click", () => {
        const key = header.dataset.sortKey;
        const type = header.dataset.sortType || "string";
        const direction = header.classList.contains("sort-asc") ? "desc" : "asc";

        clearSortIndicators(parentTableHeaders);
        header.classList.add(direction === "asc" ? "sort-asc" : "sort-desc");
        sortParentByColumn(key, type, direction);
      });
    }

    // Add sorting to children table headers
    for (const header of childTableHeaders) {
      header.addEventListener("click", () => {
        const key = header.dataset.sortKey;
        const type = header.dataset.sortType || "string";
        const direction = header.classList.contains("sort-asc") ? "desc" : "asc";

        clearSortIndicators(childTableHeaders);
        header.classList.add(direction === "asc" ? "sort-asc" : "sort-desc");
        sortByColumn(key, type, direction);
      });
    }

    sortByColumn("total_time", "number", "desc");
  </script>
</body>
</html>
